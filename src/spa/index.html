<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Aeterna" />
    <meta name="description" content="Fasting tracker for a healthier life" />
    <title>Aeterna</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <script>
      (function() {
        var t = 'dark';
        try { t = localStorage.getItem('aeterna-theme') || 'dark'; } catch(e) {}
        var d = t === 'dark';
        document.documentElement.style.height = '100%';
        document.documentElement.style.background = d
          ? 'linear-gradient(to bottom, #000 50%, #1C1C1E 50%)'
          : 'linear-gradient(to bottom, #F5F5F7 50%, #F5F5F7 50%)';
        var m = document.getElementById('theme-color-meta');
        if (m) m.content = d ? '#000000' : '#F5F5F7';
      })();
    </script>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }
      #root {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
