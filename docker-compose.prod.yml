services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src/infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - spa-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

  spa:
    build:
      context: ./src/spa
      dockerfile: ../../src/infrastructure/docker/spa.Dockerfile
    volumes:
      - spa-dist:/app/dist

  backend:
    build:
      context: ./src/backend
      dockerfile: ../../src/infrastructure/docker/backend.Dockerfile
    volumes:
      - ./src/database:/database:ro
    env_file:
      - .env
    environment:
      - MIGRATIONS_PATH=/database/migrations
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeterna"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  spa-dist:
